<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ====== TEXTOS DE MARCA ====== -->
  <title>JaviTrader · Enlaces</title>
  <meta name="description" content="Análisis diario del mercado · Bitcoin · Criptomonedas · Macro. Todos mis enlaces en un solo sitio." />

  <!-- Vista previa al compartir (WhatsApp / Telegram / X) -->
  <meta property="og:title" content="JaviTrader · Todos mis enlaces" />
  <meta property="og:description" content="Análisis diario del mercado · Bitcoin · Criptomonedas · Macro." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://comerciante220600-ui.github.io/javitrader-bio/" />
  <meta property="og:image" content="https://comerciante220600-ui.github.io/javitrader-bio/banner.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="icon" href="logo.png" />

  <style>
    /* ====== BRANDING JAVITRADER: negro + dorado ====== */
    :root {
      --bg: #0a0a0a;
      --surface: #16140f;
      --surface-hover: #1f1c14;
      --border: rgba(230,172,26,0.14);
      --border-strong: rgba(230,172,26,0.40);
      --text: #f6f3ea;
      --text-dim: #a39a82;
      --accent: #e6ac1a;          /* dorado del logo */
      --accent-soft: rgba(230,172,26,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 44px 18px 60px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
      animation: rise 0.5s ease both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    /* Banner de cabecera (imagen de X/YouTube) */
    .banner {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 16px;
      border: 1px solid var(--border);
      display: block;
    }

    .avatar {
      width: 104px; height: 104px;
      border-radius: 50%;
      margin: -52px auto 16px;   /* solapa el banner */
      position: relative; z-index: 2;
      object-fit: cover;
      display: flex; align-items: center; justify-content: center;
      background: #000;
      color: var(--accent);
      font-size: 36px; font-weight: 700; letter-spacing: 1px;
      border: 3px solid var(--bg);
    }

    h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
    .bio { color: var(--text-dim); font-size: 13.5px; margin-top: 6px; line-height: 1.5; }

    .links { display: flex; flex-direction: column; gap: 12px; margin-top: 26px; }

    .link {
      display: flex; align-items: center; gap: 14px;
      padding: 15px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      text-decoration: none;
      font-size: 15px; font-weight: 500;
      transition: background 0.15s, transform 0.12s, border-color 0.15s;
    }
    .link:hover { background: var(--surface-hover); border-color: var(--border-strong); transform: translateY(-1px); }
    .link:active { transform: scale(0.99); }
    .link .ico { width: 22px; height: 22px; flex-shrink: 0; color: var(--accent); }
    .link .label { flex: 1; text-align: left; }
    .link .chev { width: 16px; height: 16px; color: var(--text-dim); opacity: 0.5; }

    /* Botón destacado (premium) */
    .link.featured {
      background: var(--accent-soft);
      border-color: var(--accent);
    }
    .link.featured .label { color: var(--accent); }
    .badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      background: var(--accent); color: #1a1300;
      padding: 3px 8px; border-radius: 20px;
    }

    .section-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-dim); margin: 16px 4px 2px; text-align: left;
    }

    .footer { margin-top: 28px; font-size: 12px; color: var(--text-dim); }
    .footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <main class="card">

    <!-- Banner de cabecera (mismo de X/YouTube) -->
    <img class="banner" src="banner.png" alt="JaviTrader · análisis diario del mercado"
         onerror="this.style.display='none'" />

    <!-- Usa tu logo logo.png; si no carga, muestra "JT" en dorado -->
    <img class="avatar" src="logo.png" alt="JaviTrader"
         onerror="this.outerHTML='&lt;div class=&quot;avatar&quot;&gt;JT&lt;/div&gt;'" />

    <h1>JaviTrader</h1>

        <span class="label">Canal de señales (premium)</span>
        <span class="badge">PRO</span>

      <a class="link" href="https://www.bitunix.com/register?vipCode=JaviTrader" target="_blank" rel="noopener">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.5 5 5.5.8-4 3.9 1 5.5L12 20l-5 2.6 1-5.5-4-3.9 5.5-.8z"/></svg>
        <span class="label">Bitunix · bonus de bienvenida</span>

      <a class="link" href="https://bingxdao.com/partner/JaviTrade" target="_blank" rel="noopener">

        <span class="label">BingX · descuento en comisiones</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M9 7h8v8"/></svg>
      </a>

    </div>

    <p class="footer">© <span id="year"></span> JaviTrader</p>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
